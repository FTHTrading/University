# FTHTrading University — GitHub Pages Deployment
# Canonical static archive · HTTPS enforced · Zero runtime
#
# Trigger: push to main branch
# Output: Static export (out/) → GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify canonical registry
        run: |
          echo "── Canonical Registry Verification ──"
          if [ -f out/canonical-registry.json ]; then
            echo "✓ canonical-registry.json present"
            node -e "const r=require('./out/canonical-registry.json'); console.log('  Articles:', r.articles.length); console.log('  Merkle Root:', r.epoch.root.slice(0,24) + '…')"
          else
            echo "✗ canonical-registry.json MISSING"
            exit 1
          fi

      - name: Verify sitemap
        run: |
          if [ -f out/sitemap.xml ]; then
            echo "✓ sitemap.xml present"
          else
            echo "✗ sitemap.xml MISSING"
            exit 1
          fi

      - name: Verify RSS feed
        run: |
          if [ -f out/blog/rss.xml ]; then
            echo "✓ RSS feed present"
          else
            echo "✗ RSS feed MISSING"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
