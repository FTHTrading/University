  <line x1="128" y1="270" x2="384" y2="270" stroke="url(#g)" stroke-width="2" opacity="0.3"/>
  <!-- Q1 maroon -->
  <path d="M256 100 L128 155 L128 270 L256 270 Z" fill="url(#m)" opacity="0.5"/>
  <!-- Q4 maroon -->
  <path d="M256 270 L384 270 L384 305 Q384 400 256 448 Z" fill="url(#m)" opacity="0.5"/>
