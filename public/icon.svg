  <polygon points="192,180 196,195 212,195 200,205 204,220 192,210 180,220 184,205 172,195 188,195" fill="#C8A24C" opacity="0.8"/>
  <polygon points="320,340 324,355 340,355 328,365 332,380 320,370 308,380 312,365 300,355 316,355" fill="#C8A24C" opacity="0.8"/>
  <!-- Open Book -->
  <g transform="translate(256,240)">
    <path d="M-8 -32 L-72 -20 L-72 36 L-8 28 Z" fill="#0B1F3B" stroke="#C8A24C" stroke-width="3"/>
    <path d="M8 -32 L72 -20 L72 36 L8 28 Z" fill="#0B1F3B" stroke="#C8A24C" stroke-width="3"/>
    <line x1="0" y1="-36" x2="0" y2="32" stroke="#C8A24C" stroke-width="4"/>
    <line x1="-18" y1="-10" x2="-58" y2="-4" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
    <line x1="-18" y1="0" x2="-58" y2="6" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
    <line x1="-18" y1="10" x2="-58" y2="16" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="-10" x2="58" y2="-4" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="0" x2="58" y2="6" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="10" x2="58" y2="16" stroke="#C8A24C" stroke-width="1.2" opacity="0.5"/>
  </g>
